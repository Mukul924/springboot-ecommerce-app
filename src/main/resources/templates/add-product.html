<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Add Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.card{
border:none;
border-radius:15px;
}

</style>

</head>
<body>
	
	<div th:replace=
	"fragments/seller-navbar :: sellerNavbar">

	</div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Add Product
                </h2>

                <form th:action="@{/saveProduct}"
                      method="post"
					  enctype="multipart/form-data"
                      th:object="${product}">

                    <div class="mb-3">

                        <label>
                            Product Name
                        </label>

                        <input type="text"
                               th:field="*{name}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>
                            Description
                        </label>

                        <textarea th:field="*{description}"
                                  class="form-control">
                        </textarea>

                    </div>

                    <div class="mb-3">

                        <label>
                            Price
                        </label>

                        <input type="number"
                               th:field="*{price}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>
                            Category
                        </label>

                        <input type="text"
                               th:field="*{category}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>
                            Upload Image
                        </label>

						<input type="file"
						       name="imageFile"
						       class="form-control">
                    </div>

                    <div class="mb-3">

                        <label>
                            Stock
                        </label>

                        <input type="number"
                               th:field="*{stock}"
                               class="form-control">

                    </div>

                    <button class="btn btn-dark w-100">

                        Add Product

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
