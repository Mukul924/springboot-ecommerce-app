<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Seller Orders</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body style="background:#f1f3f6;">
	<div th:replace=
	"fragments/seller-navbar :: sellerNavbar">

	</div>

<div class="container mt-5 p-4 bg-white rounded-4 shadow-lg">

    <h2 class="mb-4">
        Seller Orders
    </h2>

    <table class="table table-bordered bg-white">

        <thead class="table-dark">

            <tr>

                <th>Customer</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Status</th>
				<th>Payment</th>
				<th>Action</th>

            </tr>

        </thead>

        <tbody>

            <tr th:each="order : ${orders}">

				<td th:text="${order.user.username}">
				</td>

                <td th:text="${order.product.name}">
                </td>

                <td>
                    ₹
                    <span th:text="${order.product.price}">
                    </span>
                </td>

                <td th:text="${order.quantity}">
                </td>

                <td>

					<span th:if="${order.orderStatus == 'PENDING'}"
					      class="badge bg-warning">

					    Pending

					</span>

					<span th:if="${order.orderStatus == 'SHIPPED'}"
					      class="badge bg-primary">

					    Shipped

					</span>

					<span th:if="${order.orderStatus == 'DELIVERED'}"
					      class="badge bg-success">

					    Delivered

					</span>

                </td>
				
				<td>

				    <span th:if=
				    "${order.payment != null and order.payment.paymentStatus == 'PAID'}"
				    class="badge bg-success">

				        PAID

				    </span>

				    <span th:if=
				    "${order.payment != null and order.payment.paymentStatus == 'PENDING'}"
				    class="badge bg-warning">

				        PENDING

				    </span>

				    <span th:if=
				    "${order.payment == null}"
				    class="badge bg-secondary">

				        N/A

				    </span>

				</td>
				
				<td>

				    <a th:href=
				    "@{/updateOrderStatus/{id}/{status}
				    (id=${order.id},
				    status='SHIPPED')}"

				       class="btn btn-sm btn-primary">

				        Ship

				    </a>

				    <a th:href=
				    "@{/updateOrderStatus/{id}/{status}
				    (id=${order.id},
				    status='DELIVERED')}"

				       class="btn btn-sm btn-success">

				        Deliver

				    </a>

				</td>

            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
