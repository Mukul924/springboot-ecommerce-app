<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Manage Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.product-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.product-img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

</style>

</head>
<body>
	
	<div th:replace=
	"fragments/seller-navbar :: sellerNavbar">

	</div>

<div class="container mt-5">

    <h2 class="mb-4">
        My Products
    </h2>

    <div th:each="product : ${products}"
         class="product-card shadow">

        <div class="row align-items-center">

            <div class="col-md-2">

				<img th:src= "@{'/images/' + ${product.imageUrl}}"
				     class="product-img">

            </div>

            <div class="col-md-3">

                <h4 th:text="${product.name}">
                </h4>

            </div>

            <div class="col-md-2">

                ₹ <span th:text="${product.price}">
                </span>

            </div>

            <div class="col-md-2">

                Stock:
                <span th:text="${product.stock}">
                </span>

            </div>

            <div class="col-md-3">

                <a th:href="@{/editProduct/{id}(id=${product.id})}"
                   class="btn btn-warning">

                    Edit

                </a>

                <a th:href="@{/deleteProduct/{id}(id=${product.id})}"
                   class="btn btn-danger">

                    Delete

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
