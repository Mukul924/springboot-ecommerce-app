<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#d7d2cc,#304352);
}

.login-card{
width:420px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>

</head>
<body>

<div class="login-card">


	    <h1 class="text-center mb-4 fw-bold">
	        Login
	    </h1>

	    <div th:if="${error}"
	         class="alert alert-danger">

	        <p th:text="${error}"></p>

	    </div>
	
		<form action="/login"
		      method="post">

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>
			
			<input type="email"
			       name="username"
			       class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

			<input type="password"
			       name="password"
			       class="form-control">

        </div>


            
        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

</div>

</body>
</html>
