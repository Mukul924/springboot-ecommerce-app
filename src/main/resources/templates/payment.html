<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Payment</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
background:#f4f6f9;
}

.payment-card{
max-width:700px;
margin:auto;
margin-top:50px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.qr-box{
height:200px;
background:#f1f1f1;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
font-weight:bold;
}
.pay-btn{

width:100%;
margin-top:25px;
padding:16px;
border:none;
border-radius:14px;
font-size:20px;
font-weight:bold;

background:linear-gradient(
135deg,
#00c853,
#009624);

color:white;

transition:0.3s;

box-shadow:
0 10px 20px rgba(0,200,83,0.3);

}

.pay-btn:hover{

transform:translateY(-3px);

box-shadow:
0 15px 25px rgba(0,200,83,0.45);

background:linear-gradient(
135deg,
#00e676,
#00c853);

}

.pay-btn i{

margin-right:10px;

}
</style>

</head>

<body>

<div class="payment-card">

    <h1 class="mb-4 text-center">
        Payment Gateway
    </h1>

    <h4 class="mb-4">

        Total Amount:
        ₹
        <span th:text="${totalAmount}">
        </span>

    </h4>

    <form action="/placeOrder"
          method="post">

        <input type="hidden"
               name="address"
               th:value="${address}">

        <input type="hidden"
               name="paymentMethod"
               th:value="${paymentMethod}">

        <div th:if="${paymentMethod == 'UPI'}">

            <h5 class="mb-3">
                Scan & Pay
            </h5>

			<div class="qr-box flex-column">

			    <img src=
			"https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=fakeupi@okaxis"
			         width="180">

			    <p class="mt-3 fw-bold">

			        fakeupi@okaxis

			    </p>

			</div>

        </div>

        <div th:if="${paymentMethod == 'CARD'}">

            <div class="mb-3">
				
				<i class="fa fa-credit-card"></i>

                <label class="mb-2 fw-bold">
                    Card Number
                </label>

                <input type="text"
                       class="form-control"
                       placeholder="1234 5678 9012 3456">

            </div>

            <div class="row">

                <div class="col-md-6">

                    <input type="text"
                           class="form-control"
                           placeholder="MM/YY">

                </div>

                <div class="col-md-6">

                    <input type="text"
                           class="form-control"
                           placeholder="CVV">

                </div>

            </div>

        </div>

        <div th:if="${paymentMethod == 'COD'}">

            <div class="alert alert-warning">

                Cash will be collected
                at delivery time.

            </div>

        </div>
		
		<button class="pay-btn"
		        id="payBtn">

		    <i class="fa-solid fa-lock"></i>

		    Secure Payment

		</button>
		
		

    </form>

</div>

<script>

document
.getElementById("payBtn")
.addEventListener("click",

function(){

this.innerHTML =
"Processing Payment...";

});

</script>

</body>

</html>
