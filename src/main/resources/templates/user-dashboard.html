<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Desi Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
background:#eaeded;
}

/* NAVBAR */

.custom-navbar{
background:#131921;
padding:12px;
}

.logo{
font-size:30px;
font-weight:bold;
color:#ff9900;
text-decoration:none;
}

.search-box{
width:100%;
}

.category-bar{
background:#232f3e;
padding:10px;
}

.category-bar a{
color:white;
text-decoration:none;
margin-right:20px;
font-size:15px;
}

.category-bar a:hover{
color:#ff9900;
}

/* HERO */

.hero{
height:350px;
background:url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=1600')
center/cover;
border-radius:10px;
margin-top:15px;
display:flex;
align-items:center;
padding-left:50px;
color:white;
}

.hero h1{
font-size:50px;
font-weight:bold;
}

/* PRODUCTS */

.product-card{
border:none;
border-radius:15px;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-img{
width:100%;
height:250px;
object-fit:contain;
background:#f8f9fa;
padding:10px;
}

.price{
font-size:22px;
font-weight:bold;
color:#198754;
}

.product-desc{
height:60px;
overflow:hidden;
}

</style>

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar custom-navbar">

<div class="container-fluid">

    <a class="logo" href="#">
		Desi Store
    </a>

	<form action="/search"
	      method="get"
	      class="d-flex w-50">

		  <input class="form-control search-box"
		         type="search"
		         name="keyword"
		         placeholder="Search products...">
				 
        <button class="btn btn-warning ms-2">
            <i class="fa fa-search"></i>
        </button>

    </form>

	<div class="d-flex align-items-center gap-2 flex-wrap">

		<div class="d-flex align-items-center gap-3">

		    <span class="text-white fw-bold">

		        Hello,
		        <span th:text="${user.username}"></span>

		    </span>

		    <a href="/products"
		       class="btn btn-light">

		        <i class="fa fa-house"></i>
		        Home

		    </a>

		    <a href="/cart"
		       class="btn btn-warning">

		        <i class="fa fa-cart-shopping"></i>
		        Cart

		    </a>

		    <a href="/myOrders"
		       class="btn btn-info">

		        <i class="fa fa-box"></i>
		        Orders

		    </a>

		    <a href="/logout"
		       class="btn btn-danger px-4">

		        Logout

		    </a>

		</div>
	</div>

</nav>

<!-- CATEGORY BAR -->

<div class="category-bar px-4">

	<a href="/category/Electronics">
	    Electronics
	</a>
	<a href="/category/Fashion">
	    Fashion
	</a>
	<a href="/category/Mobiles">
	    Mobiles
	</a>
	<a href="/category/Shoes">
	    Shoes
	</a>
	<a href="/category/Stationery">
	    Stationery
	</a>
	
	<a href="/category/Grocery">
	    Grocery
	</a>
	
	<a href="/category/Kitchen">
	    Kitchen
	</a>
	<a href="/category/Books">
	    Books
	</a>

</div>

<!-- MAIN -->

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <div>

            <h1>
                Mega Sale
            </h1>

            <p class="fs-4">
                Up To 70% Off
            </p>

            <button class="btn btn-warning btn-lg">
                Shop Now
            </button>

        </div>

    </div>

    <!-- PRODUCTS -->

    <h2 class="mt-5 mb-4">
        Featured Products
    </h2>

    <div class="row g-4 mb-5">

		    <div class="col-md-3"
		         th:each="product : ${products}">

		        <div class="card product-card shadow p-3">
					
					<img th:src= "@{'/images/' + ${product.imageUrl}}"
		                 class="product-img">

						 <hr>
						 
		            <h5 class="mt-3"
		                th:text="${product.name}">
		            </h5>

					<p class="product-desc"
					   th:text="${product.description}">
					</p>

		            <div class="price">

		                ₹ <span th:text="${product.price}"></span>

		            </div>

					<a th:href="@{/product/{id}(id=${product.id})}"
					   class="btn btn-dark mt-3">

					    View Details

					</a>

		        </div>

		    </div>

		</div>
       
    </div>

</div>

</body>
</html>
