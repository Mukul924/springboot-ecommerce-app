<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.product-container{
background:white;
padding:40px;
border-radius:15px;
margin-top:40px;
}

.product-image{
width:100%;
height:450px;
object-fit:contain;
}

.price{
font-size:35px;
font-weight:bold;
color:#198754;
}

</style>

</head>
<body>

	<div th:replace="fragments/navbar :: navbar"></div>
	
<div class="container">

    <div class="product-container shadow">

        <div class="row">

            <!-- IMAGE -->

            <div class="col-md-5">

				<img th:src= "@{'/images/' + ${product.imageUrl}}"
				     class="product-image">

            </div>

            <!-- DETAILS -->

            <div class="col-md-7">

                <h2 th:text="${product.name}">
                </h2>

                <p class="mt-4"
                   th:text="${product.description}">
                </p>

                <h4 class="mt-4">
                    Category:
                    <span th:text="${product.category}">
                    </span>
                </h4>

                <h4>
                    Stock:
                    <span th:text="${product.stock}">
                    </span>
                </h4>

                <div class="price mt-4">

                    ₹ <span th:text="${product.price}">
                    </span>

                </div>

                <div class="mt-4">

					<a th:href="@{/addToCart/{id}(id=${product.id})}"
					   class="btn btn-warning btn-lg me-3">

					    Add To Cart

					</a>
					<a th:href="@{/buyNow/{id}(id=${product.id})}"
					   class="btn btn-success btn-lg">

					    Buy Now

					</a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
