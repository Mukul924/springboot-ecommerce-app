<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.edit-card{
max-width:700px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:15px;
}

</style>

</head>

<body>
	
	<div th:replace=
	"fragments/seller-navbar :: sellerNavbar">

	</div>

<div class="edit-card shadow">

    <h2 class="mb-4 text-center">
        Edit Product
    </h2>

    <form action="/updateProduct"
          method="post"
		  enctype="multipart/form-data">

        <input type="hidden"
               name="id"
               th:value="${product.id}">

        <div class="mb-3">

            <label class="form-label">
                Product Name
            </label>

            <input type="text"
                   name="name"
                   class="form-control"
                   th:value="${product.name}">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <input type="text"
                   name="category"
                   class="form-control"
                   th:value="${product.category}">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Description
            </label>

            <textarea name="description"
                      class="form-control"
                      rows="4"
                      th:text="${product.description}">
            </textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Price
            </label>

            <input type="number"
                   name="price"
                   class="form-control"
                   th:value="${product.price}">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Stock
            </label>

            <input type="number"
                   name="stock"
                   class="form-control"
                   th:value="${product.stock}">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Upload Image
            </label>

            <input type="file"
                   name="imageFile"
                   class="form-control"
                   th:value="${product.imageUrl}">
				   
				   
				          
				          

        </div>

        <button class="btn btn-success w-100">

            Update Product

        </button>

    </form>

</div>

</body>
</html>
