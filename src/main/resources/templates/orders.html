<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>My Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.orders-wrapper{
display:flex;
flex-wrap:wrap;
gap:25px;
}

.order-card{
background:white;
padding:25px;
border-radius:15px;
margin-bottom:20px;
width:380px;
}

.order-card:hover{
transform:translateY(-5px);
transition:0.3s;
}

.order-img{
width:130px;
height:130px;
object-fit:contain;
border-radius:12px;
background:linear-gradient(145deg,#f8f9ff,#e9ecff);
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

</style>

</head>
<body>

	<div th:replace="fragments/navbar :: navbar"></div>
	
<div class="container mt-5">

    <h2 class="mb-4">
        My Orders
    </h2>
	
	<div class="orders-wrapper">
		<div th:each="order : ${orders}"
		         class="order-card shadow">

				 <div class="text-center">

				     <h4>
				         Order ID:
				         <span th:text="${order.id}"></span>
				     </h4>

				     <img th:src="@{'/images/' + ${order.product.imageUrl}}"
				          class="order-img mb-3">
						  
						  <h5 th:text="${order.product.name}">
						  		</h5>


				 </div>
				 
				 <hr>
				 
				 <p>

				     Address:
				     <span th:text="${order.address}">
				     </span>

				 </p>

				
				<p>

				    Quantity:
				    <span th:text="${order.quantity}">
				    </span>

				</p>

				<p>

				    Price:
				    ₹
				    <span th:text="${order.product.price}">
				    </span>

				</p>
				
		        <h5 class="mt-3">

		            Total:
		            ₹ <span th:text="${order.totalAmount}">
		            </span>

		        </h5>

				<hr>
				
		        <p>

		            Payment:
					<span th:if="${order.payment != null}"
					      th:text=
					      "${order.payment.paymentMethod}">
					</span>

					<span th:if="${order.payment == null}">

					    N/A

					</span>

		        </p>

				<p>

				    Payment Status:

					<span th:if=
					"${order.payment != null and order.payment.paymentStatus == 'PAID'}"
					class="badge bg-success">

					    PAID

					</span>

					<span th:if=
					"${order.payment != null and order.payment.paymentStatus == 'PENDING'}"
					class="badge bg-warning">

					    PENDING

					</span>

					<span th:if=
					"${order.payment == null}"
					class="badge bg-secondary">

					    N/A

					</span>

				</p>

		    </div>

	</div>

    
</div>

</body>
</html>
