<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.cart-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.product-img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

</style>

</head>
<body>

	<div th:replace="fragments/navbar :: navbar"></div>
	
<div class="container mt-5">

    <h2 class="mb-4">
        My Cart
    </h2>

    <div th:each="item : ${cartItems}"
         class="cart-card shadow">

        <div class="row align-items-center">

            <div class="col-md-2">

				<img th:src="@{'/images/' + ${item.product.imageUrl}}"
				     class="product-img">

            </div>

            <div class="col-md-3">

                <h4 th:text="${item.product.name}">
                </h4>

            </div>

            <div class="col-md-2">

                ₹ <span th:text="${item.product.price}">
                </span>

            </div>

            <div class="col-md-2">

				<div class="d-flex align-items-center">

				    <a th:href="@{/decreaseQty/{id}(id=${item.id})}"
				       class="btn btn-danger btn-sm">

				        -

				    </a>

				    <span class="mx-3 fw-bold"
				          th:text="${item.quantity}">
				    </span>

				    <a th:href="@{/increaseQty/{id}(id=${item.id})}"
				       class="btn btn-success btn-sm">

				        +

				    </a>

				</div>
            </div>

            <div class="col-md-3">

				<a th:href="@{/removeCartItem/{id}(id=${item.id})}"
				   class="btn btn-danger">

				    Remove

				</a>

				<a href="/checkout"
				   class="btn btn-success">

				    Checkout

				</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
