<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Order Success</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.order-card{
max-width:700px;
margin:auto;
margin-top:50px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.title{
color:#198754;
font-weight:bold;
}

.label{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

    <div class="order-card">

        <h2 class="text-center title mb-4">

            Order Placed Successfully ✅

        </h2>

        <hr>

        <p>

            <span class="label">
                Customer:
            </span>

            <span th:text="${order.user.username}">
            </span>

        </p>

        <p>

            <span class="label">
                Product:
            </span>

            <span th:text="${order.product.name}">
            </span>

        </p>

        <p>

            <span class="label">
                Price:
            </span>

            ₹
            <span th:text="${order.product.price}">
            </span>

        </p>

        <p>

            <span class="label">
                Quantity:
            </span>

            <span th:text="${order.quantity}">
            </span>

        </p>

        <p>

            <span class="label">
                Total Amount:
            </span>

            ₹
            <span th:text="${order.totalAmount}">
            </span>

        </p>

        <p>

            <span class="label">
                Address:
            </span>

            <span th:text="${order.address}">
            </span>

        </p>

		<p>

		    <span class="label">
		        Payment Method:
		    </span>

		    <span th:text="${order.payment.paymentMethod}">
		    </span>

		</p>

		<p>

		    <span class="label">
		        Payment Status:
		    </span>

		    <span class="badge bg-success"
		          th:text="${order.payment.paymentStatus}">
		    </span>

		</p>
		
		<div th:if=
		"${order.payment.transactionId != null}">

		    <p>

		        <span class="label">
		            Transaction ID:
		        </span>

		        <span th:text=
		        "${order.payment.transactionId}">
		        </span>

		    </p>

		</div>

        <p>

            <span class="label">
                Order Status:
            </span>

            <span class="badge bg-warning"
                  th:text="${order.orderStatus}">
            </span>

        </p>

        <div class="text-center mt-4">

            <a href="/products"
               class="btn btn-dark">

                Continue Shopping

            </a>

        </div>

    </div>

</div>

</body>

</html>
